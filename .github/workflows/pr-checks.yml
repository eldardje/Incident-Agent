name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pylint moto[all] boto3 pytest

      - name: Run Pylint
        run: |
          PYTHON_FILES=$(find lambdas -name "*.py" 2>/dev/null || true)
          if [ -z "$PYTHON_FILES" ]; then
            echo "No Python files found in lambdas/ — skipping"
            exit 0
          fi
          echo "Linting: $PYTHON_FILES"
          pylint --fail-under=8.0 $PYTHON_FILES

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_SECURITY_TOKEN: testing
      AWS_SESSION_TOKEN: testing
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest moto[all] boto3
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ] || find lambdas -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest tests/ lambdas/ --ignore=infrastructure -v
          else
            echo "No tests found — skipping"
          fi

  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Check formatting
        run: terraform fmt -check -recursive infrastructure/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Init (no backend)
        run: terraform -chdir=infrastructure init -backend=false

      - name: Validate
        run: terraform -chdir=infrastructure validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [terraform-fmt, terraform-validate]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Init
        run: |
          terraform -chdir=infrastructure init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=incident-agent/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Select dev workspace
        run: |
          terraform -chdir=infrastructure workspace select dev || \
          terraform -chdir=infrastructure workspace new dev

      - name: Plan
        id: plan
        run: terraform -chdir=infrastructure plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan_output.txt', 'utf8');

            // Truncate if too long for GitHub comment
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n... (truncated)';
            }

            const body = `#### Terraform Plan (dev workspace)
            \`\`\`
            ${plan}
            \`\`\`

            *Pushed by @${context.actor}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Terraform Plan (dev workspace)')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
