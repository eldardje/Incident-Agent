version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # n8n - Workflow automation (mirrors ECS Fargate n8n service)
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: incident-agent-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      # PostgreSQL for execution history (mirrors RDS)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n_admin
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n_local_dev}
      - DB_POSTGRESDB_SCHEMA=n8n_executions
      # Encryption key for credentials stored in n8n
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-local-dev-encryption-key-change-me}
      # Incident Agent integration
      - INCIDENT_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:incident-agent-local-incident-alarms
      - API_GATEWAY_URL=http://localhost:4566
      - ANALYZER_INVOKE_URL=http://localstack:4566/2015-03-31/functions/incident-agent-local-analyzer/invocations
      # LocalStack AWS endpoints for n8n AWS nodes
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL - n8n execution history (mirrors RDS db.t4g.micro)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: incident-agent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n_admin
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:-n8n_local_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_admin -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # LocalStack - Mocks AWS services (DynamoDB, SNS, SES, Secrets Manager, Lambda)
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: incident-agent-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"      # LocalStack gateway
      - "4510-4559:4510-4559"  # External service ports
    environment:
      - SERVICES=dynamodb,sns,ses,secretsmanager,lambda,logs,iam
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./local-dev/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  localstack_data:
    driver: local
